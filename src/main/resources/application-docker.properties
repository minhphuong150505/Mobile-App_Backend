# GHN Configuration
app.ghn.api-url=${APP_GHN_API_URL:https://dev-online-gateway.ghn.vn/shiip/public-api/v2}
app.ghn.shop-id=${APP_GHN_SHOP_ID:YOUR_GHN_SHOP_ID}
app.ghn.token=${APP_GHN_TOKEN:YOUR_GHN_TOKEN}
app.ghn.district-id=${APP_GHN_DISTRICT_ID:YOUR_DEFAULT_DISTRICT_ID}

# OAuth2 Configuration (Google)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:YOUR_GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:YOUR_GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/login/oauth2/code/google
